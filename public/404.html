<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      ;(function () {
        var path = location.pathname.replace(/^\/irina-design/, '') || '/'
        sessionStorage.redirect = path + location.search + location.hash
        location.replace('/irina-design/')
      })()
    </script>
  </head>
  <body></body>
</html>
